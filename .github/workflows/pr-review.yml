name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

      - name: Run AI review
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python -c "
import os, subprocess, requests

base_sha = os.environ['BASE_SHA']
head_sha = os.environ['HEAD_SHA']

result = subprocess.run(['git', 'diff', f'{base_sha}...{head_sha}', '--stat'], capture_output=True, text=True)
diff_stat = result.stdout[:500]

result2 = subprocess.run(['git', 'diff', f'{base_sha}...{head_sha}'], capture_output=True, text=True)
diff_full = result2.stdout[:15000]

hf_token = os.environ['HF_API_KEY']

prompt = f'''You are an experienced Python developer. Review this Pull Request.

CHANGED FILES STAT:
{diff_stat}

DIFF:
{diff_full}

Write a code review in Russian with these sections:
1. 📝 Описание — что изменилось
2. ✅ Что хорошего
3. ⚠️ Потенциальные проблемы
4. 💡 Рекомендации
5. 🔢 Оценка — от 1 до 10'''

response = requests.post(
    'https://router.huggingface.co/novita/v3/openai/chat/completions',
    headers={
        'Authorization': f'Bearer {hf_token}',
        'Content-Type': 'application/json',
    },
    json={
        'model': 'meta-llama/llama-3.1-8b-instruct',
        'messages': [{'role': 'user', 'content': prompt}],
        'max_tokens': 1000,
        'temperature': 0.7,
    },
    timeout=60,
)

if response.status_code != 200:
    print(f'Error: {response.status_code} — {response.text}')
    exit(1)

data = response.json()
review_text = data['choices'][0]['message']['content']

comment_body = f'''## 🤖 AI Code Review (Llama 3.1 8B)

{review_text}

---
<sub>Автоматическое ревью · коммит {head_sha[:7]}</sub>'''

repo = os.environ['REPO']
pr_number = os.environ['PR_NUMBER']
gh_token = os.environ['GH_TOKEN']

resp = requests.post(
    f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments',
    headers={
        'Authorization': f'Bearer {gh_token}',
        'Accept': 'application/vnd.github+json',
    },
    json={'body': comment_body},
)

if resp.status_code == 201:
    print('✅ Комментарий опубликован')
else:
    print(f'Error: {resp.status_code} — {resp.text}')
    exit(1)
"
