name: AI Pull Request Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Ask AI for review
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT=$(cat <<EOF
          Ты senior code reviewer.
          Проанализируй git diff и дай:
          1. Краткое описание изменений
          2. Возможные ошибки
          3. Проблемы безопасности
          4. Рекомендации по улучшению

          DIFF:
          $(cat diff.txt)
          EOF
          )

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -s \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": $(jq -Rs . <<< "$PROMPT")
                }
              ],
              \"temperature\": 0.2
            }")

          echo "$RESPONSE" > response.json

          COMMENT=$(jq -r '.choices[0].message.content' response.json)

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.ai.outputs.comment }}`
            })