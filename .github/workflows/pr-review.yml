name: PR Review with AI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        run: |
          git fetch origin main
          FILES=$(git diff --name-only origin/main...HEAD | paste -s -d ', ' -)
          echo "changed_files=$FILES" >> $GITHUB_OUTPUT

      - name: Post comment to PR
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const changedFiles = `${{ steps.files.outputs.changed_files }}`;
            const prNumber = context.issue.number;
            const prAuthor = context.payload.pull_request.user.login;

            const comment = `## 🤖 AI Code Review

**Pull Request #${prNumber}**
**Автор:** @${prAuthor}

### Изменённые файлы:
\`\`\`
${changedFiles || 'Не удалось определить список файлов'}
\`\`\`

### Рекомендации по проверке:
1. Проверьте код на ошибки
2. Убедитесь, что тесты проходят
3. Проверьте безопасность (нет ли секретов)
4. Нет ли дублирования кода

---
*Автоматический комментарий от GitHub Actions*`;

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });