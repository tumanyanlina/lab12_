name: PR Review with AI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...${{ github.head_ref }} | head -c 4000)
          echo "diff_content<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Review using free API
        id: ai-review
        run: |
          DIFF="${{ steps.diff.outputs.diff_content }}"
          
          RESPONSE=$(curl -s https://api.simplesummary.ai/v1/chat \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-3.5-turbo\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"Ты — senior code reviewer. Проанализируй изменения в коде. Напиши на русском языке что изменилось, найди потенциальные проблемы, дай короткие рекомендации.\"},
                {\"role\": \"user\", \"content\": \"Проанализируй эти изменения в коде: $DIFF\"}
              ]
            }")
          
          echo "review=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Post comment to PR
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const reviewText = `${{ steps.ai-review.outputs.review }}`;
            
            const message = `## 🤖 AI Code Review
                        
            ### Анализ изменений:
                        
            ${reviewText || 'Не удалось получить анализ от ИИ. Пожалуйста, проверьте изменения вручную.'}
                        
            ---
            *Автоматический анализ изменений в этом Pull Request.*
            `;
                        
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });