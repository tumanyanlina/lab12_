name: PR Review with AI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get changed files
        id: changed-files
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only origin/main...HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create AI Review Comment
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const changedFiles = `${{ steps.changed-files.outputs.files }}`;
            
            const reviewMessage = `## 🤖 AI Code Review
            
            ### Изменённые файлы:
            \`\`\`
            ${changedFiles || 'Нет изменений'}
            \`\`\`
            
            ### Рекомендации:
            - Проверьте код на наличие ошибок
            - Убедитесь, что тесты проходят
            - Проверьте безопасность
            
            ---
            *Автоматический комментарий от GitHub Actions*
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewMessage
            });