name: AI Code Review (Groq)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff size: $(wc -c < pr_diff.txt) bytes"

      - name: Run AI Review via Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python << 'EOF'
          import os
          from groq import Groq

          client = Groq(api_key=os.environ["GROQ_API_KEY"])

          with open("pr_diff.txt", "r", encoding="utf-8") as f:
              diff = f.read()

          if len(diff) > 12000:
              diff = diff[:12000] + "\n\n... (diff truncated)"

          if not diff.strip():
              review = "## 🤖 AI Code Review\n\nИзменений в коде не обнаружено."
          else:
              response = client.chat.completions.create(
                  model="llama-3.3-70b-versatile",
                  messages=[
                      {
                          "role": "system",
                          "content": (
                              "Ты senior Python разработчик. "
                              "Проведи ревью следующего git diff. "
                              "Найди: баги, проблемы безопасности, проблемы производительности, "
                              "нарушения стиля PEP8, отсутствие обработки ошибок. "
                              "Отвечай на русском языке. "
                              "Используй эмодзи для наглядности. "
                              "Формат ответа строго такой:\n"
                              "## 🤖 AI Code Review\n"
                              "### ✅ Что сделано хорошо\n"
                              "### ⚠️ Замечания\n"
                              "### 🐛 Баги / потенциальные проблемы\n"
                              "### 💡 Предложения по улучшению"
                          )
                      },
                      {
                          "role": "user",
                          "content": f"Git diff для ревью:\n\n```diff\n{diff}\n```"
                      }
                  ],
                  max_tokens=1500,
                  temperature=0.3,
              )
              review = response.choices[0].message.content

          with open("review.txt", "w", encoding="utf-8") as f:
              f.write(review)

          print("✅ Review generated successfully")
          print(review)
          EOF

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            const body = `${review}

            ---
            *🤖 Ревью сгенерировано автоматически · модель \`llama-3.3-70b-versatile\` via Groq · [Посмотреть лог](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });